name: Release

on:
  push:
    tags: [ 'v*' ]

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048M -Dfile.encoding=UTF-8"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Build & Test
      run: ./gradlew build

    - name: Build Debug APK
      run: ./gradlew :composeApp:assembleDebug

    - name: Rename APK
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        mv composeApp/build/outputs/apk/debug/*.apk \
           composeApp/build/outputs/apk/debug/blackjack-trainer-${VERSION}.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: composeApp/build/outputs/apk/debug/blackjack-trainer-*.apk
